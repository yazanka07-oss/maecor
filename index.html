<script>
// ═══════════════════════════
//  BACKEND — localStorage
// ═══════════════════════════
window.DB = {
  hash: s => btoa(unescape(encodeURIComponent(s + ":maysour2025"))),
  verify: (s,h) => window.DB.hash(s) === h,
  get: k => { try{const v=localStorage.getItem("ms:"+k);return v?JSON.parse(v):null}catch{return null} },
  set: (k,v) => { try{localStorage.setItem("ms:"+k,JSON.stringify(v))}catch{} },
  del: k => { try{localStorage.removeItem("ms:"+k)}catch{} },
  register: (name,biz,email,pass) => {
    if(window.DB.get("u:"+email)) return {ok:false,err:"البريد مسجل مسبقاً"}
    const u={id:Date.now().toString(36),name,biz,email,passHash:window.DB.hash(pass),currency:"ليرة",taxRate:0,joinDate:new Date().toISOString().split("T")[0],plan:"free"}
    window.DB.set("u:"+email,u)
    window.DB.set("session",{email,expires:Date.now()+30*24*60*60*1000})
    return {ok:true,user:{...u,passHash:undefined}}
  },
  login: (email,pass) => {
    const u=window.DB.get("u:"+email)
    if(!u||!window.DB.verify(pass,u.passHash)) return {ok:false,err:"البريد أو كلمة المرور غير صحيحة"}
    window.DB.set("session",{email,expires:Date.now()+30*24*60*60*1000})
    const clean={...u};delete clean.passHash;return {ok:true,user:clean}
  },
  getSession: () => {
    const s=window.DB.get("session")
    if(!s||s.expires<Date.now()){window.DB.del("session");return null}
    const u=window.DB.get("u:"+s.email)
    if(!u)return null
    const clean={...u};delete clean.passHash;return clean
  },
  changePass: (email,oldP,newP) => {
    const u=window.DB.get("u:"+email)
    if(!u||!window.DB.verify(oldP,u.passHash)) return false
    window.DB.set("u:"+email,{...u,passHash:window.DB.hash(newP)})
    return true
  },
  updateUser: (email,updates) => {
    const u=window.DB.get("u:"+email)
    if(!u) return
    window.DB.set("u:"+email,{...u,...updates})
  },
  backup: email => {
    const tables=["txns","custs","supps","items","invs","quotes","banks","budget","journal","returns","vouchers","assets"]
    const data={exportDate:new Date().toISOString(),email}
    tables.forEach(t=>{data[t]=window.DB.get(t+":"+email)||[]})
    return JSON.stringify(data,null,2)
  },
  restore: (email,json) => {
    try{
      const data=JSON.parse(json)
      const tables=["txns","custs","supps","items","invs","quotes","banks","budget","journal","returns","vouchers","assets"]
      tables.forEach(t=>{if(data[t])window.DB.set(t+":"+email,data[t])})
      return true
    }catch{return false}
  }
}

}

window.printInvoice = (inv, custs, supps, user) => {

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px">
      <div style="font-size:12px;line-height:2"><strong>رقم الفاتورة:</strong> ${inv.id}<br><strong>التاريخ:</strong> ${inv.date}<br>${inv.dueDate?`<strong>الاستحقاق:</strong> ${inv.dueDate}<br>`:""}<strong>الحالة:</strong> ${inv.status}</div>
      <div style="font-size:12px;line-height:2"><strong>${inv.type==="مبيعات"?"العميل":"المورد"}:</strong> ${inv.partyName||"—"}<br>${party?.phone?`<strong>الهاتف:</strong> ${party.phone}<br>`:""}<strong>المشروع:</strong> ${user.biz}</div>
    </div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:14px">
      <thead><tr style="background:#0099bb;color:white"><th style="padding:9px;text-align:right">الصنف</th><th style="padding:9px;text-align:center">الكمية</th><th style="padding:9px;text-align:center">السعر</th><th style="padding:9px;text-align:center">الإجمالي</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="max-width:240px;margin-right:auto">
      ${[["مجموع فرعي",inv.subtotal],inv.tax?["ضريبة",inv.tax]:null,inv.disc?["خصم",-inv.disc]:null,["الإجمالي",inv.total]].filter(Boolean).map(([l,v],i,a)=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;${i===a.length-1?"font-weight:900;font-size:15px;color:#0099bb;border-top:2px solid #0099bb;border-bottom:none":"font-size:12px"}"><span>${l}</span><span>${(v||0).toLocaleString("ar-SY")} ل.س</span></div>`).join("")}
    </div>
    ${inv.notes?`<p style="margin-top:14px;padding:9px;background:#f5f5f5;border-radius:5px;font-size:11px">ملاحظات: ${inv.notes}</p>`:""}
    <div style="margin-top:36px;display:flex;justify-content:space-between">
      <div style="text-align:center"><div style="width:150px;border-top:1px solid #333;padding-top:4px;font-size:11px">توقيع المسؤول</div></div>
      <div style="text-align:center"><div style="width:150px;border-top:1px solid #333;padding-top:4px;font-size:11px">ختم الشركة</div></div>
    </div>`
  window.printDoc("فاتورة "+inv.id, content)
}

window.printVoucher = (v, user) => {

      <h2 style="text-align:center;color:#0099bb;margin-bottom:16px">${v.type==="قبض"?"سند قبض":"سند صرف"}</h2>

        <div><strong>المبلغ:</strong> ${(v.amount||0).toLocaleString("ar-SY")} ${v.currency==="ليرة"?"ل.س":"$"}</div>
        <div><strong>طريقة الدفع:</strong> ${v.method||"نقدي"}</div>

const Tip = ({ active, payload, label }) => {

const Btn = ({ onClick, children, v="primary", disabled=false, full=false, sm=false, icon }) => {
  const S = {
    primary:   { bg:T.gCyan,   c:T.white, brd:"none",              sh:`0 4px 14px ${T.cyan}33`  },
    secondary: { bg:"transparent", c:T.muted, brd:`1px solid ${T.border2}`, sh:"none" },
    success:   { bg:T.gGreen,  c:T.white, brd:"none",              sh:`0 4px 14px ${T.green}33` },
    danger:    { bg:`${T.red}15`, c:T.red, brd:`1px solid ${T.red}33`, sh:"none"                },
    gold:      { bg:T.gGold,   c:T.white, brd:"none",              sh:`0 4px 14px ${T.gold}33`  },
  }
  const s = S[v] || S.primary
  return (
    <button onClick={disabled ? undefined : onClick} disabled={disabled}
      style={{ background:disabled?T.border:s.bg, color:disabled?T.muted:s.c, border:s.brd, borderRadius:10,

        fontFamily:"inherit", transition:"all .2s", display:"inline-flex", alignItems:"center", gap:6,

}

// ── Error Boundary ──
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null } }
  static getDerivedStateFromError(e) { return { err: e } }
  render() {
    if (this.state.err) return (
      <div style={{ padding:24, textAlign:"center" }}>
        <div style={{ fontSize:36, marginBottom:12 }}>⚠️</div>
        <div style={{ color:"#fff", fontWeight:700, marginBottom:8, fontSize:15 }}>حدث خطأ في هذه الصفحة</div>
        <div style={{ color:"#4a6b8a", fontSize:11, marginBottom:16, wordBreak:"break-all" }}>{this.state.err.message}</div>
        <button onClick={() => this.setState({ err:null })}
          style={{ background:"linear-gradient(135deg,#00d4f5,#0099bb)", color:"#fff", border:"none", borderRadius:10, padding:"9px 20px", cursor:"pointer", fontFamily:"inherit", fontWeight:700, fontSize:13 }}>
          إعادة المحاولة
        </button>
      </div>
    )
    return this.props.children
  }
}

function InvForm({ data, isQuote=false, onSave, ctx }) {
  const { custs, supps, user, mob, invs, quotes, persist, flash1, setModal, nav } = ctx
  const parties = isQuote ? custs : data?.type==="مشتريات" ? supps : custs

  ))
  const upRow = (i, k, v) => setF(p => {
    const rows = p.items.map((r, idx) => { if (idx !== i) return r; const n = { ...r, [k]:k==="qty"||k==="price"?+v:v }; n.total = n.qty*n.price; return n })
    const sub = rows.reduce((s, r) => s+r.total, 0)
    const tax = isQuote ? 0 : Math.round(sub*(user.taxRate||0)/100)
    return { ...p, items:rows, subtotal:sub, tax, total:sub+tax-(p.disc||0) }
  })
  return (
    <>
      <div style={{ display:"grid", gridTemplateColumns:mob?"1fr":"1fr 1fr", gap:8 }}>
        {!isQuote && <FSel label="النوع" v={f.type} onChange={v => setF(p => ({...p, type:v, partyId:"", partyName:""}))} opts={["مبيعات","مشتريات"]}/>}
        <FSel label={isQuote?"العميل":f.type==="مبيعات"?"العميل":"المورد"} v={isQuote?f.custId:f.partyId}
          onChange={v => { const p = parties.find(x=>x.id===v); setF(prev => isQuote ? {...prev,custId:v,custName:p?.name||""} : {...prev,partyId:v,partyName:p?.name||""}) }}

        {isQuote ? <FInp label="صالح حتى" v={f.validUntil} onChange={v=>setF(p=>({...p,validUntil:v}))} type="date"/> : <FInp label="تاريخ الاستحقاق" v={f.dueDate} onChange={v=>setF(p=>({...p,dueDate:v}))} type="date"/>}
        {!isQuote && <FSel label="الحالة" v={f.status} onChange={v=>setF(p=>({...p,status:v}))} opts={["معلقة","مدفوعة","ملغاة"]}/>}
        {isQuote && <FSel label="الحالة" v={f.status} onChange={v=>setF(p=>({...p,status:v}))} opts={["مفتوح","مقبول","مرفوض","محوّل"]}/>}
      </div>
      <div style={{ fontSize:11, color:T.muted, fontWeight:700, marginBottom:8 }}>الأصناف</div>
      <div style={{ overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
      <div style={{ minWidth: mob ? 420 : "auto" }}>
      {f.items.map((r, i) => (
        <div key={i} style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr 80px 22px", gap:5, marginBottom:5, alignItems:"center" }}>
          <input value={r.name} onChange={e=>upRow(i,"name",e.target.value)} placeholder="الصنف" style={{ background:T.surface, border:`1px solid ${T.border2}`, borderRadius:7, padding:"8px 10px", color:T.text, fontSize:12, fontFamily:"inherit", direction:"rtl" }}/>
          <input value={r.qty||""} onChange={e=>upRow(i,"qty",e.target.value)} type="number" placeholder="كمية" style={{ background:T.surface, border:`1px solid ${T.border2}`, borderRadius:7, padding:"8px", color:T.text, fontSize:12, textAlign:"center" }}/>
          <input value={r.price||""} onChange={e=>upRow(i,"price",e.target.value)} type="number" placeholder="سعر" style={{ background:T.surface, border:`1px solid ${T.border2}`, borderRadius:7, padding:"8px", color:T.text, fontSize:12, textAlign:"center" }}/>
          <div style={{ color:T.green, fontWeight:700, fontSize:11, textAlign:"center" }}>{fmt(r.total)}</div>
          <button onClick={()=>setF(p=>({...p,items:p.items.filter((_,idx)=>idx!==i)}))} style={{ background:"none", border:"none", color:T.red, cursor:"pointer", fontSize:16 }}>×</button>
        </div>
      ))}
      </div>
      </div>
      <button onClick={()=>setF(p=>({...p,items:[...p.items,{name:"",qty:1,price:0,total:0}]}))} style={{ background:T.surface, border:`1px dashed ${T.border2}`, color:T.muted, borderRadius:7, padding:"5px", fontSize:11, cursor:"pointer", fontFamily:"inherit", width:"100%", marginBottom:10 }}>+ صنف</button>
      <div style={{ background:T.surface, borderRadius:9, padding:"10px 14px", marginBottom:12 }}>
        {!isQuote && [["مجموع فرعي",f.subtotal,T.muted],[`ضريبة ${user.taxRate||0}%`,f.tax,T.gold]].map(([l,v,c])=>(
          <div key={l} style={{ display:"flex", justifyContent:"space-between", fontSize:12, padding:"3px 0" }}><span style={{ color:T.muted }}>{l}</span><span style={{ color:c, fontFamily:"monospace" }}>{fmt(v)}</span></div>

        )}
        <Btn onClick={() => setModal(null)} v="secondary">إلغاء</Btn>
      </div>
    </>
  )
}

// ModalRouter — يختار الـ Modal الصحيح بثبات
function ModalRouter({ modal, ctx }) {
  if (!modal) return null
  const d = modal.d
  switch(modal.t) {
    case 'cust':         return <CustModal d={d} ctx={ctx}/>
    case 'supp':         return <SuppModal d={d} ctx={ctx}/>
    case 'item':         return <ItemModal d={d} ctx={ctx}/>
    case 'bank':         return <BankModal d={d} ctx={ctx}/>
    case 'journal':      return <JournalModal d={d} ctx={ctx}/>
    case 'return_modal': return <ReturnModal ctx={ctx}/>
    case 'settings':     return <SettingsModal ctx={ctx}/>
    case 'invoice':      return (
      <Modal title={d?"تعديل فاتورة":"فاتورة جديدة"} onClose={() => ctx.setModal(null)} w={560}>
        <InvForm data={d} ctx={ctx} onSave={f => {
          const updated = d ? ctx.invs.map(x=>x.id===d.id?f:x) : [{ ...f, id:`INV-${Date.now().toString(36).toUpperCase()}` }, ...ctx.invs]
          ctx.persist("invs", updated); ctx.flash1("✓ حُفظت الفاتورة"); ctx.setModal(null)
        }}/>
      </Modal>
    )
    case 'quote':        return (
      <Modal title={d?"تعديل عرض":"عرض سعر جديد"} onClose={() => ctx.setModal(null)} w={540}>
        <InvForm data={d} isQuote ctx={ctx} onSave={f => {
          const updated = d ? ctx.quotes.map(x=>x.id===d.id?f:x) : [{ ...f, id:`QUO-${Date.now().toString(36).toUpperCase()}` }, ...ctx.quotes]
          ctx.persist("quotes", updated); ctx.flash1("✓ حُفظ العرض"); ctx.setModal(null)
        }}/>
      </Modal>
    )
    default: return null
  }
}

      const u = { name:f.name, biz:f.biz, email:f.email, pass:f.pass, currency:"ليرة", taxRate:0, joinDate:today() }

function MaysourApp({ user, onLogout, onUpdateUser }) {
  // ── State ──
  const [pg, setPg]       = useState("dashboard")
  const [hist, setHist]   = useState(["dashboard"])
  const [txns, setTxns]   = useState([])
  const [custs, setCusts] = useState([])
  const [supps, setSupps] = useState([])
  const [items, setItems] = useState([])
  const [invs, setInvs]   = useState([])
  const [quotes, setQuotes]   = useState([])
  const [banks, setBanks]     = useState([])
  const [budget, setBudget]   = useState([])
  const [journal, setJournal] = useState([])
  const [returns, setReturns] = useState([])
  const [flash, setFlash]   = useState(null)
  const [modal, setModal]   = useState(null)
  const [sideOpen, setSideOpen] = useState(false)
  const [srch, setSrch]     = useState("")
  // Input
  const [aiTxt, setAiTxt]       = useState("")
  const [aiLoad, setAiLoad]     = useState(false)
  const [imgPrev, setImgPrev]   = useState(null)
  const [imgB64, setImgB64]     = useState(null)
  const [inputMode, setInputMode] = useState("text")
  const [voiceSt, setVoiceSt]   = useState("idle")
  const [voiceTxt, setVoiceTxt] = useState("")
  // Advisor
  const [advQ, setAdvQ]   = useState("")
  const [advA, setAdvA]   = useState("")
  const [advLoad, setAdvLoad] = useState(false)
  // Filters
  const [txnFilter, setTxnFilter] = useState("الكل")
  const fileRef = useRef(null)
  const recRef  = useRef(null)
  const [mob, setMob] = useState(window.innerWidth <= 680)
  useEffect(() => {
    const h = () => setMob(window.innerWidth <= 680)
    window.addEventListener("resize", h)
    return () => window.removeEventListener("resize", h)
  }, [])

  // ── Load data ──
  const K = k => `${k}:${user.email}`
  useEffect(() => {
    ;(async () => {
      setTxns(  await DB.get(K("txns"))   || DEMO.txns)
      setCusts( await DB.get(K("custs"))  || DEMO.custs)
      setSupps( await DB.get(K("supps"))  || DEMO.supps)
      setItems( await DB.get(K("items"))  || DEMO.items)
      setInvs(  await DB.get(K("invs"))   || DEMO.invs)
      setQuotes(await DB.get(K("quotes")) || DEMO.quotes)
      setBanks( await DB.get(K("banks"))  || DEMO.banks)
      setBudget(await DB.get(K("budget")) || DEMO.budget)
      setJournal(await DB.get(K("journal")) || [])
      setReturns(await DB.get(K("returns")) || [])
    })()
  }, [user.email])

  // ── Navigation ──
  const nav = useCallback(p => { setHist(h => [...h.slice(-9), p]); setPg(p); setSideOpen(false) }, [])
  const back = () => { if (hist.length < 2) return; const p = hist[hist.length-2]; setHist(h => h.slice(0,-1)); setPg(p) }

  // ── Flash ──
  const flash1 = (msg, color = T.green) => { setFlash({ msg, color }); setTimeout(() => setFlash(null), 3500) }

  // ── Persist ──
  const persist = async (col, data) => {
    const S = { txns:setTxns, custs:setCusts, supps:setSupps, items:setItems, invs:setInvs, quotes:setQuotes, banks:setBanks, budget:setBudget, journal:setJournal, returns:setReturns }
    S[col]?.(data)
    if (!user.isDemo) await DB.set(K(col), data)
  }

  // ── Financials ──
  const sales    = txns.filter(t => t.type==="بيع"||t.type==="إيراد").reduce((s,t) => s+t.amount, 0)
  const expenses = txns.filter(t => t.type==="مصروف"||t.type==="شراء").reduce((s,t) => s+t.amount, 0)
  const profit   = sales - expenses
  const pct      = sales > 0 ? Math.round((profit/sales)*100) : 0
  const invVal   = items.reduce((s,i) => s + i.qty*i.cost, 0)
  const lowStock = items.filter(i => i.qty <= i.minQty)
  const pendingTotal = invs.filter(i => i.status==="معلقة").reduce((s,i) => s+i.total, 0)
  const overdue  = invs.filter(i => i.status==="معلقة" && i.dueDate && new Date(i.dueDate)<new Date())
  const bankTot  = banks.filter(b => b.cur==="ليرة").reduce((s,b) => s+b.bal, 0)
  const taxDue   = Math.round(sales * (user.taxRate||0) / 100)
  const budgetActual = budget.map(b => {
    const actual = txns.filter(t => t.entry?.debit===b.cat||t.entry?.credit===b.cat).reduce((s,t) => s+t.amount, 0)

      if (res) {
        const t = { id:uid(), ...res, date:today(), time:new Date().toLocaleTimeString("ar-SY",{hour:"2-digit",minute:"2-digit"}) }
        await persist("txns", [t, ...txns])
        setAiTxt(""); setImgPrev(null); setImgB64(null)
        flash1(`✓ سُجّلت: ${res.summary}`)
        nav("dashboard")
      } else flash1("تعذّر التحليل، حاول مرة ثانية", T.red)
    } catch { flash1("خطأ في الاتصال", T.red) }
    setAiLoad(false)

  const startVoice = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition
    if (!SR) { flash1("يحتاج Chrome للتعرف على الصوت", T.gold); return }
    const r = new SR()
    r.lang = "ar-SA"; r.continuous = false; r.interimResults = true
    r.onstart = () => setVoiceSt("listening")
    r.onresult = e => {
      const t = Array.from(e.results).map(r => r[0].transcript).join("")
      setVoiceTxt(t)
      if (e.results[e.results.length-1].isFinal) { setVoiceSt("processing"); setAiTxt(t) }
    }
    r.onerror = e => { setVoiceSt("idle"); if (e.error==="not-allowed") flash1("اسمح بالوصول للميكروفون", T.red) }
    r.onend = () => { setVoiceSt("idle"); setVoiceTxt("") }
    r.start(); recRef.current = r
  }

  const handleImg = e => {

    const reader = new FileReader()
    reader.onload = ev => {
      setImgPrev(ev.target.result)
      const img = new Image()
      img.onload = () => {
        const c = document.createElement("canvas"), MAX = 1024
        let w = img.width, h = img.height
        if (w>MAX) { h = Math.round(h*MAX/w); w = MAX }
        if (h>MAX) { w = Math.round(w*MAX/h); h = MAX }
        c.width = w; c.height = h
        c.getContext("2d").drawImage(img, 0, 0, w, h)
        setImgB64(c.toDataURL("image/jpeg", .85).split(",")[1])
      }
      img.src = ev.target.result
    }
    reader.readAsDataURL(file)

    aging: () => {
      const now = new Date()
      const B = { "0-30 يوم":[], "31-60 يوم":[], "61-90 يوم":[], "+90 يوم":[] }
      const CLR = { "0-30 يوم":T.green, "31-60 يوم":T.gold, "61-90 يوم":T.red, "+90 يوم":"#8b0000" }
      invs.filter(i=>i.status==="معلقة"&&i.dueDate).forEach(inv => {
        const d = Math.floor((now-new Date(inv.dueDate))/86400000)
        if (d<=30) B["0-30 يوم"].push(inv)
        else if (d<=60) B["31-60 يوم"].push(inv)
        else if (d<=90) B["61-90 يوم"].push(inv)
        else B["+90 يوم"].push(inv)
      })
      return (
        <P title="تقرير الذمم المتأخرة" sub="Aging Report">
          <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:10, marginBottom:14 }}>
            {Object.entries(B).map(([l,items]) => (
              <StatCard key={l} label={l} value={fmtC(items.reduce((s,i)=>s+i.total,0))} sub={`${items.length} فاتورة`} color={CLR[l]}/>
            ))}
          </div>
          {Object.entries(B).map(([l,items]) => items.length>0 && (
            <div key={l} style={{ background:T.card, border:`1px solid ${CLR[l]}33`, borderRadius:12, padding:14, marginBottom:10 }}>
              <div style={{ color:CLR[l], fontWeight:800, marginBottom:10, fontSize:13 }}>{l} — {fmt(items.reduce((s,i)=>s+i.total,0))} ل.س</div>
              {items.map(inv => (
                <div key={inv.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:`1px solid ${T.border}`, fontSize:12 }}>
                  <div>
                    <div style={{ color:T.white, fontWeight:600 }}>{inv.partyName}</div>
                    <div style={{ fontSize:10, color:T.muted }}>{inv.id} — استحقاق: {inv.dueDate}</div>
                  </div>
                  <span style={{ fontWeight:700, color:CLR[l], fontFamily:"monospace" }}>{fmt(inv.total)} ل.س</span>
                </div>
              ))}
            </div>
          ))}
        </P>
      )
    },

    journal: () => (

              </div>
              {j.entries?.map((e, i) => (
                <div key={i} style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr", gap:4, padding:"4px 0", borderTop:`1px solid ${T.border}` }}>

    search: () => {
      const q = srch.trim().toLowerCase()
      if (!q) return <P title="البحث"><div style={{ textAlign:"center", padding:40, color:T.muted }}>ابدأ بالكتابة للبحث...</div></P>
      const rTxns  = txns.filter(t => t.summary?.toLowerCase().includes(q) || t.type?.includes(q))
      const rCusts = custs.filter(c => c.name?.toLowerCase().includes(q) || c.phone?.includes(q))

      const rInvs  = invs.filter(i => i.partyName?.toLowerCase().includes(q) || i.notes?.toLowerCase().includes(q))

      return (
        <P title={`نتائج البحث`} sub={`${total} نتيجة لـ "${srch}"`}>
          {!total && <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:14, padding:36, textAlign:"center", color:T.muted }}>
            <div style={{ fontSize:36, marginBottom:12 }}>🔍</div>
            <div style={{ fontSize:14, fontWeight:700, color:T.white, marginBottom:6 }}>لا توجد نتائج</div>
            <div style={{ fontSize:12 }}>جرّب كلمات مختلفة</div>
          </div>}
          {rTxns.length>0 && <>

                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:12, color:T.text, fontWeight:600 }}>{t.summary}</div>

                  </div>
                  {typeChip(t.type)}
                  <div style={{ fontWeight:800, fontSize:12, color:(t.type==="بيع"||t.type==="إيراد")?T.green:T.red }}>{fmt(t.amount)} ل.س</div>
                </div>
              ))}
            </div>
          </>}
          {rCusts.length>0 && <>
            <div style={{ fontSize:11, color:T.muted, fontWeight:700, marginBottom:8 }}>العملاء ({rCusts.length})</div>
            <div style={{ display:"grid", gridTemplateColumns:mob?"1fr":"1fr 1fr", gap:8, marginBottom:14 }}>
              {rCusts.map(c=>(
                <div key={c.id} style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:"12px 14px" }}>
                  <div style={{ fontWeight:700, color:T.white, marginBottom:3 }}>{c.name}</div>

            </div>
          </>}
          {rItems.length>0 && <>
            <div style={{ fontSize:11, color:T.muted, fontWeight:700, marginBottom:8 }}>الأصناف ({rItems.length})</div>
            <div style={{ display:"grid", gridTemplateColumns:mob?"1fr":"1fr 1fr", gap:8, marginBottom:14 }}>
              {rItems.map(it=>(
                <div key={it.id} style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:"12px 14px" }}>
                  <div style={{ fontWeight:700, color:T.white, marginBottom:3 }}>{it.name}</div>

          {rInvs.length>0 && <>

                    <div style={{ fontSize:12, color:T.white, fontWeight:700 }}>{inv.id}</div>

              <button key={q} onClick={() => setAdvQ(q)}
                style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:11, padding:"11px 14px", cursor:"pointer", textAlign:"right", display:"flex", alignItems:"center", gap:8, fontFamily:"inherit", color:T.text, fontSize:11, transition:"all .2s" }}
                onMouseEnter={e => { e.currentTarget.style.borderColor=T.cyan; e.currentTarget.style.background=T.cardHov }}
                onMouseLeave={e => { e.currentTarget.style.borderColor=T.border; e.currentTarget.style.background=T.card }}>
                <span style={{ fontSize:17, flexShrink:0 }}>{ic}</span>{q}

          </div>
          <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:14, overflow:"hidden" }}>
            <div style={{ padding:"10px 16px", borderBottom:`1px solid ${T.border}`, display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ width:7, height:7, borderRadius:"50%", background:T.green, boxShadow:`0 0 7px ${T.green}` }}/>
              <span style={{ fontSize:10, color:T.muted }}>يعمل على: إيرادات {fmt(sales)} · مصاريف {fmt(expenses)} · ربح {fmt(profit)} ل.س · {custs.length} عملاء · {items.length} صنف</span>
            </div>
            <textarea value={advQ} onChange={e=>setAdvQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&e.ctrlKey&&askAdvisor()} placeholder="اسأل أي سؤال مالي..."

              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                <div style={{ width:26, height:26, borderRadius:8, background:T.gCyan, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13 }}>🤖</div>
                <span style={{ fontSize:12, fontWeight:800, color:T.cyan }}>المستشار AI</span>
              </div>
              <div style={{ fontSize:13, color:T.text, lineHeight:2, whiteSpace:"pre-wrap" }}>{advA}</div>
            </div>
          )}
        </div>
      </P>
    ),

    finance: () => (
      <P title="الملف التمويلي" sub="ملف جاهز للبنوك وجهات الدعم">
        <div style={{ display:"grid", gridTemplateColumns:mob?"1fr":"1fr 1fr", gap:12 }}>
          <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:14, padding:18 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <span style={{ fontWeight:800, color:T.white, fontSize:13 }}>ملخص المشروع</span>
              <Chip label="جاهز للتقديم ✓" color={T.green}/>
            </div>
            {[["اسم المشروع",user.biz],["صاحب المشروع",user.name],["إجمالي الإيرادات",fmtC(sales)],["إجمالي المصاريف",fmtC(expenses)],["صافي الربح",fmtC(profit)],["هامش الربح",`${pct}%`],["عملاء نشطون",custs.length],["قيمة المخزون",fmtC(invVal)],["معاملات موثقة",txns.length]].map(([l,v],i) => (
              <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0", borderBottom:`1px solid ${T.border}`, fontSize:12 }}>
                <span style={{ color:T.muted }}>{l}</span><span style={{ color:T.text, fontWeight:600 }}>{v}</span>
              </div>
            ))}
          </div>
          <div>
            <div style={{ display:"grid", gridTemplateColumns:mob?"1fr":"1fr 1fr", gap:8, marginBottom:10 }}>
              {[["📄","أرباح وخسائر","pl"],["⚖️","الميزانية","bs"],["📒","ميزان المراجعة","trial"],["⏰","تقرير الذمم","aging"],["🔍","تحليل المصاريف","expAnal"],["🧮","تقرير الضريبة","tax"]].map(([ic,t,pg2]) => (
                <button key={t} onClick={() => nav(pg2)}
                  style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:"12px", cursor:"pointer", textAlign:"right", display:"flex", alignItems:"center", gap:8, fontFamily:"inherit", color:T.text, fontSize:11, transition:"all .2s" }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor=T.cyan; e.currentTarget.style.background=T.cardHov }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor=T.border; e.currentTarget.style.background=T.card }}>
                  <span style={{ fontSize:20 }}>{ic}</span>
                  <div><div style={{ fontWeight:700, color:T.white, fontSize:11 }}>{t}</div><div style={{ fontSize:9, color:T.cyan, marginTop:2 }}>اضغط للعرض ←</div></div>
                </button>
              ))}
            </div>
            <div style={{ background:`linear-gradient(135deg,${T.cyan}15,${T.purple}15)`, border:`1px solid ${T.cyan}44`, borderRadius:12, padding:16, textAlign:"center" }}>
              <div style={{ color:T.white, fontWeight:800, marginBottom:4, fontSize:13 }}>🏦 إرسال للبنك أو جهة التمويل</div>
              <div style={{ color:T.muted, fontSize:11, marginBottom:12 }}>الملف الكامل بضغطة واحدة</div>
              <Btn onClick={() => flash1("✓ تم إرسال الملف التمويلي بنجاح!",T.green)} icon="📤">إرسال الملف ←</Btn>
            </div>
          </div>
        </div>
      </P>
    ),
  }

  // ──────────────────────────────────────────────────────
  //  RENDER
  // ──────────────────────────────────────────────────────
  const ctx = { mob, custs, supps, items, invs, quotes, banks, journal, returns, txns, user, onUpdateUser, setModal, persist, flash1, saveMod, nav }

  return (
    <div style={{ display:"flex", minHeight:"100vh", background:T.bg, fontFamily:"'Cairo',Tahoma,sans-serif", direction:"rtl", color:T.text }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes ripple{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.2);opacity:1}}
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:${T.border2};border-radius:3px}
        input,textarea,select{outline:none}
        @media(max-width:680px){
          .desk-side{display:none!important}
          .mob-bar{display:flex!important}
          .main-wrap{padding:12px 12px 70px!important}
        }
        @media(min-width:681px){.mob-bar{display:none!important}}
      `}</style>

      {/* Flash notification */}
      {flash && (
        <div style={{ position:"fixed", top:16, left:"50%", transform:"translateX(-50%)", background:flash.color+"18", border:`1px solid ${flash.color}44`, color:flash.color, padding:"9px 22px", borderRadius:30, fontSize:12, fontWeight:700, zIndex:3000, animation:"fadeUp .3s ease", whiteSpace:"nowrap", backdropFilter:"blur(12px)", boxShadow:`0 8px 24px ${flash.color}22` }}>
          {flash.msg}
        </div>
      )}

      {/* Modals */}
      <ModalRouter modal={modal} ctx={ctx}/>

      {/* Mobile overlay */}
      {sideOpen && <div style={{ position:"fixed", inset:0, background:"#000b", zIndex:998, backdropFilter:"blur(3px)" }} onClick={() => setSideOpen(false)}/>}
      {sideOpen && <div style={{ position:"fixed", top:0, right:0, bottom:0, zIndex:999 }}><Sidebar mobile/></div>}

      {/* Desktop sidebar */}
      <div className="desk-side"><Sidebar/></div>

      {/* Mobile top bar */}
      <div className="mob-bar" style={{ position:"fixed", top:0, right:0, left:0, height:56, background:T.surface+"ee", borderBottom:`1px solid ${T.border}`, zIndex:100, alignItems:"center", justifyContent:"space-between", padding:"0 12px", display:"none", backdropFilter:"blur(16px)" }}>
        <button onClick={() => setSideOpen(true)} style={{ background:T.card, border:`1px solid ${T.border}`, color:T.white, fontSize:18, cursor:"pointer", width:36, height:36, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center" }}>☰</button>
        <div style={{ fontSize:16, fontWeight:900, color:T.white }}>📊 ميسور</div>
        <button onClick={() => nav("input")} style={{ background:T.gCyan, border:"none", color:"#000", fontSize:18, fontWeight:900, cursor:"pointer", width:36, height:36, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", boxShadow:`0 4px 12px ${T.cyan}44` }}>+</button>
      </div>

      {/* Main content */}
      <div className="main-wrap" style={{ flex:1, overflow:"auto", padding:"20px 24px" }}>
        {/* Mobile top spacer */}
        <div className="mob-bar" style={{ height:56, display:"none" }}/>
        {/* Global Search Bar */}
        <div style={{ position:"relative", marginBottom:16 }}>
          <input value={srch} onChange={e=>{setSrch(e.target.value); if(e.target.value) nav("search")}} placeholder="🔍  ابحث في المعاملات، العملاء، الأصناف..."
            style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:"10px 16px", color:T.text, fontSize:12, fontFamily:"inherit", direction:"rtl", transition:"border-color .2s", boxSizing:"border-box" }}
            onFocus={e=>e.target.style.borderColor=T.cyan} onBlur={e=>e.target.style.borderColor=T.border}/>
          {srch && <button onClick={()=>{setSrch(""); nav("dashboard")}} style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:T.muted, cursor:"pointer", fontSize:16 }}>×</button>}
        </div>
        <ErrorBoundary key={pg}>
          {(PAGES[pg] || PAGES.dashboard)()}
        </ErrorBoundary>
      </div>

      {/* Mobile bottom nav */}
      <div className="mob-bar" style={{ position:"fixed", bottom:0, right:0, left:0, background:T.surface+"ee", borderTop:`1px solid ${T.border}`, padding:"5px 0 10px", zIndex:100, display:"none", backdropFilter:"blur(16px)" }}>
        {[["dashboard","🏠","رئيسي"],["input","➕","إدخال"],["txns","📋","معاملات"],["invoices","🧾","فواتير"],["advisor","🤖","AI"]].map(([p,ic,l]) => (
          <button key={p} onClick={() => nav(p)} style={{ flex:1, background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:2, padding:"4px 0", color:pg===p?T.cyan:T.muted, fontFamily:"inherit", transition:"all .2s", position:"relative" }}>
            <div style={{ width:36, height:36, borderRadius:12, background:pg===p?T.cyan+"15":"transparent", display:"flex", alignItems:"center", justifyContent:"center", transition:"all .2s" }}>
              <span style={{ fontSize:19 }}>{ic}</span>
            </div>
            <span style={{ fontSize:9, fontWeight:pg===p?800:500 }}>{l}</span>
            {pg===p && <div style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", width:24, height:2, background:T.cyan, borderRadius:2 }}/>}
          </button>
        ))}
      </div>
    </div>
  )
}

// ──────────────────────────────────────────────────────
//  9. ROOT
// ──────────────────────────────────────────────────────
function MaysourRoot() {
  const [user, setUser]     = useState(null)
  const [checking, setChk] = useState(true)

  useEffect(() => {
    ;(async () => {
      const s = await DB.get("curUser")
      if (s) setUser(s)
      setChk(false)
    })()
  }, [])

  if (checking) return (
    <div style={{ minHeight:"100vh", background:T.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <Spin s={36}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  )

  const login = async u => { setUser(u); if (!u.isDemo) await DB.set("curUser", u) }
  const logout = async () => { await DB.del("curUser"); setUser(null) }
  const updateUser = async u => {
    setUser(u)
    if (!u.isDemo) { await DB.set("curUser", u); await DB.set(`u:${u.email}`, u) }
  }

  return user
    ? <MaysourApp user={user} onLogout={logout} onUpdateUser={updateUser}/>
    : <AuthScreen onLogin={login}/>
}
ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary>
    <MaysourRoot/>
  </ErrorBoundary>
)
</script>
</body>
