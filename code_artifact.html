// ═══════════════════════════
//  BACKEND — محاكاة قاعدة البيانات المحلية الآمنة
// ═══════════════════════════
window.DB = {
  hash: s => btoa(unescape(encodeURIComponent(s + ":maysour2025"))),
  verify: (s, h) => window.DB.hash(s) === h,
  get: k => { 
    try {
      const v = localStorage.getItem("ms:" + k);
      return v ? JSON.parse(v) : null;
    } catch { return null; } 
  },
  set: (k, v) => { 
    try {
      localStorage.setItem("ms:" + k, JSON.stringify(v));
    } catch {} 
  },
  del: k => { 
    try {
      localStorage.removeItem("ms:" + k);
    } catch {} 
  },
  register: (name, biz, email, pass) => {
    if (window.DB.get("u:" + email)) return { ok: false, err: "البريد الإلكتروني مسجل مسبقاً" };
    const u = {
      id: Date.now().toString(36),
      name,
      biz,
      email,
      passHash: window.DB.hash(pass),
      currency: "ليرة",
      taxRate: 0,
      joinDate: new Date().toISOString().split("T")[0],
      plan: "free"
    };
    window.DB.set("u:" + email, u);
    window.DB.set("session", { email, expires: Date.now() + 30 * 24 * 60 * 60 * 1000 });
    return { ok: true, user: { ...u, passHash: undefined } };
  },
  login: (email, pass) => {
    const u = window.DB.get("u:" + email);
    if (!u || !window.DB.verify(pass, u.passHash)) return { ok: false, err: "البريد الإلكتروني أو كلمة المرور غير صحيحة" };
    window.DB.set("session", { email, expires: Date.now() + 30 * 24 * 60 * 60 * 1000 });
    const clean = { ...u };
    delete clean.passHash;
    return { ok: true, user: clean };
  },
  getSession: () => {
    const s = window.DB.get("session");
    if (!s || s.expires < Date.now()) {
      window.DB.del("session");
      return null;
    }
    const u = window.DB.get("u:" + s.email);
    if (!u) return null;
    const clean = { ...u };
    delete clean.passHash;
    return clean;
  },
  changePass: (email, oldP, newP) => {
    const u = window.DB.get("u:" + email);
    if (!u || !window.DB.verify(oldP, u.passHash)) return false;
    window.DB.set("u:" + email, { ...u, passHash: window.DB.hash(newP) });
    return true;
  },
  updateUser: (email, updates) => {
    const u = window.DB.get("u:" + email);
    if (!u) return;
    window.DB.set("u:" + email, { ...u, ...updates });
  }
};
</script>

function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [f, setF] = useState({ name: "", biz: "", email: "", pass: "" });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const set = k => v => setF(p => ({ ...p, [k]: v }));

  const go = async () => {
    setErr(""); 
    setLoading(true);
    await new Promise(r => setTimeout(r, 600));
    
    if (mode === "register") {
      if (!f.name || !f.biz || !f.email || !f.pass) { 
        setErr("يرجى تعبئة كافة الحقول المطلوبة"); 
        setLoading(false); 
        return; 
      }
      const res = window.DB.register(f.name, f.biz, f.email, f.pass);
      if (res.ok) {
        onLogin(res.user);
      } else {
        setErr(res.err);
      }
    } else {
      const res = window.DB.login(f.email, f.pass);
      if (res.ok) {
        onLogin(res.user);
      } else {
        setErr(res.err);
      }
    }
    setLoading(false);
  };

  return (
    <div style={{ 
      minHeight: "100vh", 
      background: `radial-gradient(ellipse at 30% 20%, #0d2040 0%, ${T.bg} 60%)`, 
      display: "flex", 
      alignItems: "center", 
      justifyContent: "center", 
      padding: "16px" 
    }}>
      <div style={{ width: "100%", maxWidth: "420px", animation: "fadeUp .5s ease-out" }}>
        <div style={{ textAlign: "center", marginBottom: "28px" }}>
          <div style={{ 
            width: "70px", 
            height: "70px", 
            borderRadius: "20px", 
            background: T.gCyan, 
            display: "flex", 
            alignItems: "center", 
            justifyContent: "center", 
            fontSize: "32px", 
            margin: "0 auto 16px", 
            boxShadow: `0 12px 32px ${T.cyan}44` 
          }}>📊</div>
          <h1 style={{ fontSize: "36px", fontWeight: "900", color: T.white, margin: 0, letterSpacing: "-0.5px" }}>ميسور</h1>
          <p style={{ color: T.muted, fontSize: "13px", margin: "6px 0 0" }}>المحاسب الذكي والآمن للمنشآت والمشاريع السورية</p>
        </div>
        
        <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: "24px", padding: "28px", boxShadow: "0 20px 60px rgba(0,0,0,0.5)" }}>
          <div style={{ display: "flex", gap: "6px", marginBottom: "24px", background: T.surface, borderRadius: "14px", padding: "4px" }}>
            {[["login", "تسجيل الدخول"], ["register", "إنشاء حساب جديد"]].map(([m, l]) => (
              <button

                  flex: 1, 
                  padding: "10px", 
                  border: "none", 
                  borderRadius: "10px", 
                  cursor: "pointer", 
                  background: mode === m ? T.card : "transparent", 
                  color: mode === m ? T.cyan : T.muted, 
                  fontSize: "13px", 
                  fontWeight: "bold", 
                  transition: "all 0.2s" 
                }}
              >
                {l}
              </button>
            ))}
          </div>

          {mode === "register" && (
            <>
              <FInp label="الاسم الكامل" v={f.name} onChange={set("name")} req />
              <FInp label="اسم المحل / المشروع التجاري" v={f.biz} onChange={set("biz")} req />

          <FInp label="البريد الإلكتروني" v={f.email} onChange={set("email")} type="email" req />
          <FInp label="كلمة المرور" v={f.pass} onChange={set("pass")} type="password" req />
          
          {err && (
            <div style={{ 
              color: T.red, 
              fontSize: "12px", 
              marginBottom: "14px", 
              textAlign: "center",

              color: T.white, 
              fontSize: "14px", 
              fontWeight: "800", 
              cursor: "pointer", 
              display: "flex", 
              alignItems: "center", 
              justifyContent: "center", 
              gap: "10px", 
              boxShadow: `0 6px 20px ${T.cyan}33`,

          <div style={{ textAlign: "center", marginTop: "18px", paddingTop: "16px", borderTop: `1px solid ${T.border}` }}>

// ──────────────────────────────────────────────────────
//  7. التطبيق المحاسبي الأساسي (MaysourApp)
// ──────────────────────────────────────────────────────
function MaysourApp({ user, onLogout, onUpdateUser }) {
  const [pg, setPg] = useState("dashboard");
  const [hist, setHist] = useState(["dashboard"]);
  
  // قواعد البيانات الداخلية
  const [txns, setTxns] = useState([]);
  const [custs, setCusts] = useState([]);
  const [supps, setSupps] = useState([]);
  const [items, setItems] = useState([]);
  const [invs, setInvs] = useState([]);
  const [quotes, setQuotes] = useState([]);
  const [banks, setBanks] = useState([]);
  const [budget, setBudget] = useState([]);
  const [journal, setJournal] = useState([]);
  const [returns, setReturns] = useState([]);

  // حالات الإدخال والتفاعل
  const [flash, setFlash] = useState(null);
  const [modal, setModal] = useState(null);
  const [sideOpen, setSideOpen] = useState(false);

  // واجهات الذكاء الاصطناعي والمستشار
  const [aiTxt, setAiTxt] = useState("");
  const [aiLoad, setAiLoad] = useState(false);
  const [inputMode, setInputMode] = useState("text");
  const [advQ, setAdvQ] = useState("");
  const [advA, setAdvA] = useState("");
  const [advLoad, setAdvLoad] = useState(false);
  
  const [txnFilter, setTxnFilter] = useState("الكل");

  // تحميل وحفظ البيانات لكل مستخدم بشكل منفصل
  const K = k => `${k}:${user.email}`;

  useEffect(() => {
    const loadAll = async () => {
      setTxns(window.DB.get(K("txns")) || DEMO.txns);
      setCusts(window.DB.get(K("custs")) || DEMO.custs);
      setSupps(window.DB.get(K("supps")) || DEMO.supps);
      setItems(window.DB.get(K("items")) || DEMO.items);
      setInvs(window.DB.get(K("invs")) || DEMO.invs);
      setQuotes(window.DB.get(K("quotes")) || DEMO.quotes);
      setBanks(window.DB.get(K("banks")) || DEMO.banks);
      setBudget(window.DB.get(K("budget")) || DEMO.budget);
      setJournal(window.DB.get(K("journal")) || DEMO.journal);
      setReturns(window.DB.get(K("returns")) || DEMO.returns);
    };
    loadAll();
  }, [user.email]);

  const persist = (col, data) => {
    const setters = {
      txns: setTxns, custs: setCusts, supps: setSupps,
      items: setItems, invs: setInvs, quotes: setQuotes,
      banks: setBanks, budget: setBudget, journal: setJournal,
      returns: setReturns
    };
    if (setters[col]) setters[col](data);
    if (!user.isDemo) {
      window.DB.set(K(col), data);
    }
  };

  // الملاحة والتنقل الخلفي
  const nav = useCallback(p => {
    setHist(h => [...h, p]);
    setPg(p);
    setSideOpen(false);
  }, []);

  const back = () => {
    if (hist.length < 2) return;
    const prev = hist[hist.length - 2];
    setHist(h => h.slice(0, -1));
    setPg(prev);
  };

  const showFlash = (msg, color = T.green) => {
    setFlash({ msg, color });
    setTimeout(() => setFlash(null), 3500);
  };

  // الحسابات المالية اللحظية لملخص الحسابات
  const sales = useMemo(() => {
    return txns.filter(t => t.type === "بيع" || t.type === "إيراد").reduce((s, t) => s + (t.amount || 0), 0);
  }, [txns]);

  const expenses = useMemo(() => {
    return txns.filter(t => t.type === "مصروف" || t.type === "شراء").reduce((s, t) => s + (t.amount || 0), 0);
  }, [txns]);

  const profit = sales - expenses;
  const marginPct = sales > 0 ? Math.round((profit / sales) * 100) : 0;
  
  const invVal = useMemo(() => {
    return items.reduce((s, i) => s + ((i.qty || 0) * (i.cost || 0)), 0);
  }, [items]);

  const lowStock = useMemo(() => {
    return items.filter(i => (i.qty || 0) <= (i.minQty || 0));
  }, [items]);

  const pendingTotal = useMemo(() => {
    return invs.filter(i => i.status === "معلقة").reduce((s, i) => s + (i.total || 0), 0);
  }, [invs]);

  const bankTot = useMemo(() => {
    return banks.filter(b => b.cur === "ليرة").reduce((s, b) => s + (b.bal || 0), 0);
  }, [banks]);

  const taxDue = Math.round(sales * (user.taxRate || 0) / 100);

  const budgetActual = useMemo(() => {
    return budget.map(b => {
      const actual = txns.filter(t => t.entry?.debit === b.cat || t.entry?.credit === b.cat).reduce((s, t) => s + (t.amount || 0), 0);
      return { 
        ...b, 
        actual, 
        variance: b.plan - actual, 
        pct: b.plan > 0 ? Math.round((actual / b.plan) * 100) : 0 
      };
    });
  }, [budget, txns]);

  // محاكاة سريعة لتحليل المعاملات بالذكاء الاصطناعي محلياً لمنع المشاكل البرمجية
  const parseTransactionWithAI = async (text) => {
    setAiLoad(true);
    await new Promise(r => setTimeout(r, 1200)); // محاكاة المعالجة اللحظية
    let type = "بيع";
    let amount = 150000;
    let category = "المبيعات";
    let debit = "الصندوق";
    let credit = "المبيعات";
    
    // قواعد ذكية بسيطة لتحليل النص
    const cleanText = text.toLowerCase();
    if (cleanText.includes("شراء") || cleanText.includes("اشتريت")) {
      type = "شراء";
      category = "المشتريات";
      debit = "المخزون";
      credit = "الصندوق";
    } else if (cleanText.includes("أجار") || cleanText.includes("اجار") || cleanText.includes("كهرباء") || cleanText.includes("راتب") || cleanText.includes("دفعت")) {
      type = "مصروف";
      category = cleanText.includes("أجار") ? "مصروف الإيجار" : cleanText.includes("كهرباء") ? "مصروف الكهرباء" : "مصاريف تشغيلية";
      debit = category;
      credit = "الصندوق";
    }

    const numMatch = text.match(/\d+[\d,.]*/);
    if (numMatch) {
      amount = parseInt(numMatch[0].replace(/,/g, ""), 10);
    }

    const newTxn = {
      id: uid(),
      type,
      amount,
      currency: "ليرة",
      summary: text,
      date: today(),
      time: new Date().toLocaleTimeString("ar-SY", { hour: "2-digit", minute: "2-digit" }),
      confidence: 96,
      entry: { debit, credit }
    };

    persist("txns", [newTxn, ...txns]);
    setAiTxt("");
    showFlash(`✓ تم تسجيل المعاملة بذكاء: ${type} بقيمة ${fmt(amount)} ل.س`);
    setAiLoad(false);
    nav("dashboard");
  };

  // المساعد المالي التفاعلي
  const handleAdvisorQuery = async () => {
    if (!advQ.trim()) return;
    setAdvLoad(true);
    await new Promise(r => setTimeout(r, 1500));
    
    let answer = "بناءً على مراجعة ملف مشروعك الحالي:\n\n";
    const q = advQ.toLowerCase();

    if (q.includes("ربح") || q.includes("ليش")) {
      answer += `• هامش ربحك الحالي يبلغ ${marginPct}% وهو مستقر نسبياً.\n• يفضل تقليل الاعتماد على الديون والذمم المعلقة التي تبلغ حالياً ${fmt(pendingTotal)} ل.س لرفع النقد الفعلي بالصندوق.`;
    } else if (q.includes("مصروف") || q.includes("مصاريف")) {
      answer += `• أكبر بند مصاريف مسجل هو الإيجار والخدمات العامة.\n• يوصى بمقارنة المصاريف الفعلية في قسم 'الميزانية التقديرية' لتحديد أي انحراف مالي يتجاوز الخطة المعتمدة.`;
    } else {
      answer += `• صحتك المالية جيدة، إيراداتك (${fmt(sales)} ل.س) تفوق مصاريفك (${fmt(expenses)} ل.س) بشكل آمن.\n• ننصحك بتركيز الجهود على تسريع تحصيل الفواتير المعلقة.`;
    }

    setAdvA(answer);
    setAdvLoad(false);
  };

  // دوال حذف البيانات وإجراء العمليات الإدارية
  const handleDelete = (col, arr, id) => {
    const filtered = arr.filter(x => x.id !== id);
    persist(col, filtered);
    showFlash("تم حذف البند ماليًا بنجاح", T.gold);
  };

  const handleSaveModal = (col, arr, item, extra = {}) => {
    const exists = arr.find(x => x.id === item.id);
    let updated;
    if (exists) {
      updated = arr.map(x => x.id === item.id ? item : x);
    } else {
      updated = [...arr, { ...item, id: uid(), ...extra }];
    }
    persist(col, updated);
    showFlash("✓ تم الحفظ بنجاح وتحديث السجلات");
    setModal(null);
  };

  // ──────────────────────────────────────────────────────
  //  هيكلية القائمة الجانبية وإعدادات الملاحة
  // ──────────────────────────────────────────────────────
  const NAV_ITEMS = [
    { id: "dashboard", icon: "🏠", label: "لوحة التحكم", group: "main" },
    { id: "input", icon: "➕", label: "إدخال مالي سريع", group: "main" },
    { id: "txns", icon: "📋", label: "دفتر المعاملات", group: "main", badge: txns.length },
    { id: "custs", icon: "👥", label: "إدارة العملاء", group: "manage", badge: custs.length },
    { id: "supps", icon: "🏭", label: "إدارة الموردين", group: "manage", badge: supps.length },
    { id: "stock", icon: "📦", label: "المخزن والمخزون", group: "manage", badge: lowStock.length ? { n: lowStock.length, warn: true } : null },
    { id: "invoices", icon: "🧾", label: "الفواتير المصدرة", group: "manage", badge: invs.filter(i=>i.status==="معلقة").length ? { n: invs.filter(i=>i.status==="معلقة").length, warn: true } : null },
    { id: "quotes", icon: "📝", label: "عروض الأسعار", group: "manage" },
    { id: "returns", icon: "↩️", label: "سجل المرتجعات", group: "manage" },
    { id: "banks", icon: "🏦", label: "الحسابات والنقدية", group: "manage" },
    { id: "budget", icon: "🎯", label: "الموازنة التقديرية", group: "reports" },
    { id: "pl", icon: "📊", label: "الأرباح والخسائر", group: "reports" },

    { id: "finance", icon: "📁", label: "الملف المالي المتكامل", group: "ai" }
  ];

  const GRP_LABELS = { main: "رئيسي", manage: "إدارة النظام", reports: "تقارير مالية", ai: "استشارات ذكية" };

      {mobile && (
        <button onClick={() => setSideOpen(false)} style={{ 
          position: "absolute", top: "14px", left: "14px", background: "none", border: "none", color: T.muted, fontSize: "28px", cursor: "pointer" 
        }}>&times;</button>
      )}
      
      {/* الشعار */}
      <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "10px 8px", marginBottom: "16px" }}>
        <div style={{ 
          width: "36px", height: "36px", borderRadius: "10px", background: T.gCyan, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "18px", boxShadow: `0 4px 12px ${T.cyan}33`, flexShrink: 0 
        }}>📊</div>
        <div>
          <div style={{ fontSize: "16px", fontWeight: "900", color: T.white, lineHeight: 1.1 }}>ميسور</div>
          <div style={{ fontSize: "10px", color: T.muted, letterSpacing: "0.5px" }}>v4.0 PRO</div>
        </div>
      </div>

      {/* هوية العميل والمنشأة */}
      <div style={{ background: `linear-gradient(135deg, ${T.cyan}08, ${T.blue}08)`, border: `1px solid ${T.border2}`, borderRadius: "12px", padding: "12px", marginBottom: "16px" }}>
        <div style={{ fontSize: "12px", fontWeight: "900", color: T.white, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{user.biz}</div>
        <div style={{ fontSize: "10px", color: T.muted, marginTop: "4px" }}>{user.name}</div>
        {user.isDemo && (
          <span style={{ background: T.gold + "18", color: T.gold, fontSize: "9px", padding: "2px 6px", borderRadius: "5px", marginTop: "6px", display: "inline-block", fontWeight: "bold" }}>الوضع التجريبي</span>
        )}
      </div>

      {/* تكرار القوائم والروابط */}
      <div style={{ flex: 1, overflowY: "auto", paddingRight: "2px" }}>
        {Object.entries(GRP_LABELS).map(([gk, gl]) => (
          <div key={gk} style={{ marginBottom: "12px" }}>
            <div style={{ fontSize: "10px", color: T.muted, padding: "4px 8px", fontWeight: "800", textTransform: "uppercase", letterSpacing: "1px" }}>{gl}</div>
            {NAV_ITEMS.filter(n => n.group === gk).map(n => {
              const active = pg === n.id;
              const isWarning = n.badge?.warn;
              return (
                <button 
                  key={n.id} 
                  onClick={() => nav(n.id)}
                  style={{ 
                    display: "flex", 
                    alignItems: "center", 
                    justifyContent: "space-between", 
                    width: "100%", 
                    padding: "10px 12px", 
                    border: "none", 
                    borderRadius: "10px", 
                    cursor: "pointer", 
                    background: active ? T.cyan + "15" : "transparent", 
                    color: active ? T.cyan : T.text, 
                    borderRight: active ? `3px solid ${T.cyan}` : "3px solid transparent", 
                    fontSize: "12px", 
                    fontWeight: active ? "bold" : "normal", 
                    textAlign: "right", 
                    transition: "all 0.15s", 
                    marginBottom: "2px" 
                  }}
                  onMouseEnter={e => { if(!active) e.currentTarget.style.background = T.border; }}
                  onMouseLeave={e => { if(!active) e.currentTarget.style.background = "transparent"; }}
                >
                  <div style={{ display: "flex", alignItems: "center", gap: "8px", minWidth: 0 }}>
                    <span style={{ fontSize: "14px", flexShrink: 0 }}>{n.icon}</span>
                    <span style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{n.label}</span>
                  </div>
                  {n.badge && (
                    <span style={{ 
                      background: isWarning ? T.red + "22" : T.cyan + "22", 
                      color: isWarning ? T.red : T.cyan, 
                      borderRadius: "8px", 
                      padding: "2px 8px", 
                      fontSize: "9px", 
                      fontWeight: "bold", 
                      flexShrink: 0 
                    }}>
                      {isWarning ? `⚠️ ${n.badge.n}` : n.badge}
                    </span>
                  )}
                </button>
              );
            })}
          </div>
        ))}
      </div>

      {/* خروج وإعدادات */}
      <div style={{ marginTop: "auto", paddingTop: "12px", borderTop: `1px solid ${T.border}` }}>
        <button onClick={() => setModal({ t: "settings" })} style={{ 
          width: "100%", background: "none", border: "none", color: T.muted, fontSize: "12px", cursor: "pointer", textAlign: "right", padding: "8px", display: "flex", alignItems: "center", gap: "8px" 
        }}>⚙️ إعدادات النظام</button>
        <button onClick={onLogout} style={{ 
          width: "100%", background: "none", border: `1px solid ${T.border}`, color: T.muted, borderRadius: "10px", padding: "10px", fontSize: "12px", cursor: "pointer", marginTop: "6px" 
        }}>تسجيل خروج مالي ←</button>
      </div>
    </div>
  );

  // واجهة تغليف الصفحات وحفظ الهوية
  const PageWrapper = ({ title, sub, actions, children }) => (
    <div style={{ animation: "fadeUp .3s ease-out" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px", flexWrap: "wrap", gap: "12px" }}>
        <div>
          <h1 style={{ fontSize: "22px", fontWeight: "900", color: T.white, lineHeight: 1.2 }}>{title}</h1>
          {sub && <p style={{ fontSize: "12px", color: T.muted, marginTop: "4px" }}>{sub}</p>}
        </div>
        <div style={{ display: "flex", gap: "8px" }}>{actions}</div>
      </div>
      {children}
    </div>
  );

  // ──────────────────────────────────────────────────────
  //  8. واجهات تحرير ومعالجة الفواتير وعروض الأسعار
  // ──────────────────────────────────────────────────────
  const InvForm = ({ data, isQuote = false, onSave }) => {
    const parties = isQuote ? custs : (data?.type === "مشتريات" ? supps : custs);
    const [f, setF] = useState(data || (isQuote 
      ? { custId: "", custName: "", date: today(), validUntil: today(), items: [{ name: "", qty: 1, price: 0, total: 0 }], total: 0, status: "مفتوح", notes: "" }
      : { type: "مبيعات", partyId: "", partyName: "", date: today(), dueDate: today(), items: [{ name: "", qty: 1, price: 0, total: 0 }], subtotal: 0, tax: 0, disc: 0, total: 0, status: "معلقة", notes: "" }
    ));

    const upRow = (i, k, v) => setF(p => {
      const rows = p.items.map((r, idx) => {
        if (idx !== i) return r;
        const n = { ...r, [k]: (k === "qty" || k === "price") ? Number(v) : v };
        n.total = (n.qty || 0) * (n.price || 0);
        return n;
      });
      const sub = rows.reduce((s, r) => s + (r.total || 0), 0);
      const tax = isQuote ? 0 : Math.round(sub * (user.taxRate || 0) / 100);
      return { 
        ...p, 
        items: rows, 
        subtotal: sub, 
        tax, 
        total: sub + tax - (p.disc || 0) 
      };
    });

    return (
      <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
          {!isQuote && <FSel label="نوع الفاتورة" v={f.type} onChange={v => setF(p => ({ ...p, type: v, partyId: "", partyName: "" }))} opts={["مبيعات", "مشتريات"]}/>}
          <FSel 
            label={isQuote ? "العميل المستهدف" : (f.type === "مبيعات" ? "العميل" : "المورد")} 
            v={isQuote ? f.custId : f.partyId}
            onChange={v => {
              const party = parties.find(x => x.id === v);
              setF(p => isQuote ? { ...p, custId: v, custName: party?.name || "" } : { ...p, partyId: v, partyName: party?.name || "" });
            }}
            opts={[{ v: "", l: "اختر الطرف المعني..." }, ...parties.map(p => ({ v: p.id, l: p.name }))]}
          />
          <FInp label="تاريخ المستند" v={f.date} onChange={v => setF(p => ({ ...p, date: v }))} type="date"/>
          <FInp label={isQuote ? "صالح لغاية" : "تاريخ الاستحقاق الدفع"} v={isQuote ? f.validUntil : f.dueDate} onChange={v => setF(p => ({ ...p, [isQuote ? 'validUntil' : 'dueDate']: v }))} type="date"/>
        </div>

        <div style={{ margin: "10px 0 6px", fontSize: "12px", color: T.white, fontWeight: "bold" }}>أصناف وبنود المستند:</div>
        {f.items.map((row, i) => (
          <div key={i} style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr auto", gap: "8px", alignItems: "center", marginBottom: "8px" }}>
            <input 
              value={row.name} 
              onChange={e => upRow(i, "name", e.target.value)} 
              placeholder="اسم السلعة / الخدمة" 
              style={{ background: T.surface, border: `1px solid ${T.border2}`, borderRadius: "8px", padding: "10px", color: T.text, fontSize: "12px" }}
            />
            <input 
              type="number" 
              value={row.qty || ""} 
              onChange={e => upRow(i, "qty", e.target.value)} 
              placeholder="الكمية" 
              style={{ background: T.surface, border: `1px solid ${T.border2}`, borderRadius: "8px", padding: "10px", color: T.text, fontSize: "12px", textAlign: "center" }}
            />
            <input 
              type="number" 
              value={row.price || ""} 
              onChange={e => upRow(i, "price", e.target.value)} 
              placeholder="السعر" 
              style={{ background: T.surface, border: `1px solid ${T.border2}`, borderRadius: "8px", padding: "10px", color: T.text, fontSize: "12px", textAlign: "center" }}
            />
            <button 
              onClick={() => setF(p => ({ ...p, items: p.items.filter((_, idx) => idx !== i) }))} 
              style={{ background: "none", border: "none", color: T.red, cursor: "pointer", fontSize: "20px" }}
            >
              &times;
            </button>
          </div>
        ))}

        <Btn v="secondary" onClick={() => setF(p => ({ ...p, items: [...p.items, { name: "", qty: 1, price: 0, total: 0 }] }))}>+ إضافة بند جديد</Btn>
        
        <div style={{ background: T.surface, padding: "12px", borderRadius: "10px", margin: "10px 0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: "12px", margin: "4px 0" }}>
            <span style={{ color: T.muted }}>مجموع فرعي للمواد:</span>
            <span style={{ color: T.text }}>{fmt(f.subtotal || f.total)} ل.س</span>
          </div>
          {f.tax !== undefined && (
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: "12px", margin: "4px 0" }}>
              <span style={{ color: T.muted }}>ضريبة القيمة المضافة:</span>
              <span style={{ color: T.gold }}>{fmt(f.tax)} ل.س</span>
            </div>
          )}
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: "14px", fontWeight: "bold", borderTop: `1px solid ${T.border}`, paddingTop: "8px", marginTop: "8px" }}>
            <span style={{ color: T.white }}>الإجمالي النهائي للطلب:</span>
            <span style={{ color: T.cyan }}>{fmt(f.total)} ل.س</span>
          </div>
        </div>

        <FInp label="ملاحظات وشروط إضافية" v={f.notes} onChange={v => setF(p => ({ ...p, notes: v }))}/>

        <div style={{ display: "flex", gap: "10px", marginTop: "10px" }}>
          <Btn onClick={() => onSave(f)}>حفظ التغييرات</Btn>
          <Btn v="secondary" onClick={() => setModal(null)}>إلغاء الأمر</Btn>
        </div>
      </div>
    );
  };

  // ──────────────────────────────────────────────────────
  //  9. قائمة المحاور وتوليد النوافذ المنبثقة (Modals)
  // ──────────────────────────────────────────────────────
  const renderActiveModal = () => {
    if (!modal) return null;
    
    switch (modal.t) {
      case "cust": {
        const d = modal.d;
        const [cf, setCf] = useState(d || { name: "", phone: "", email: "", address: "", balance: 0, creditLimit: 0, notes: "" });
        return (
          <Modal title={d ? "تحديث بيانات العميل" : "تسجيل عميل جديد للمنشأة"} onClose={() => setModal(null)}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              <FInp label="الاسم الكامل للعميل" v={cf.name} onChange={v => setCf(p => ({ ...p, name: v }))} req/>
              <FInp label="رقم الهاتف الخليوي" v={cf.phone} onChange={v => setCf(p => ({ ...p, phone: v }))}/>
              <FInp label="البريد الإلكتروني" v={cf.email} onChange={v => setCf(p => ({ ...p, email: v }))}/>
              <FInp label="العنوان الجغرافي" v={cf.address} onChange={v => setCf(p => ({ ...p, address: v }))}/>
              <FNum label="الرصيد الافتتاحي المستحق" v={cf.balance} onChange={v => setCf(p => ({ ...p, balance: v }))}/>
              <FNum label="سقف المديونية الأقصى" v={cf.creditLimit} onChange={v => setCf(p => ({ ...p, creditLimit: v }))}/>
            </div>
            <FInp label="ملاحظات وتوجيهات خاصة بالعميل" v={cf.notes} onChange={v => setCf(p => ({ ...p, notes: v }))}/>
            <div style={{ display: "flex", gap: "10px", marginTop: "14px" }}>
              <Btn onClick={() => handleSaveModal("custs", custs, cf, { joinDate: today() })}>حفظ العميل</Btn>
              <Btn v="secondary" onClick={() => setModal(null)}>إلغاء</Btn>
            </div>
          </Modal>
        );
      }

      case "supp": {
        const d = modal.d;
        const [sf, setSf] = useState(d || { name: "", phone: "", email: "", balance: 0, notes: "" });
        return (
          <Modal title={d ? "تحديث بيانات المورد" : "تسجيل مورد تجاري جديد"} onClose={() => setModal(null)}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              <FInp label="الاسم الكامل للمورد" v={sf.name} onChange={v => setSf(p => ({ ...p, name: v }))} req/>
              <FInp label="رقم الهاتف" v={sf.phone} onChange={v => setSf(p => ({ ...p, phone: v }))}/>
              <FNum label="الذمم والالتزامات الحالية" v={sf.balance} onChange={v => setSf(p => ({ ...p, balance: v }))}/>
            </div>
            <FInp label="ملاحظات التوريد والأسعار" v={sf.notes} onChange={v => setSf(p => ({ ...p, notes: v }))}/>
            <div style={{ display: "flex", gap: "10px", marginTop: "14px" }}>
              <Btn onClick={() => handleSaveModal("supps", supps, sf)}>حفظ المورد</Btn>
              <Btn v="secondary" onClick={() => setModal(null)}>إلغاء</Btn>
            </div>
          </Modal>
        );
      }

      case "item": {
        const d = modal.d;
        const [it, setIt] = useState(d || { name: "", sku: "", unit: "قطعة", qty: 0, cost: 0, sell: 0, minQty: 10, cat: "بضائع" });
        return (
          <Modal title={d ? "تعديل تفاصيل الصنف" : "إدراج صنف ومخزون جديد"} onClose={() => setModal(null)}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              <FInp label="اسم المادة / المنتج" v={it.name} onChange={v => setIt(p => ({ ...p, name: v }))} req/>
              <FInp label="باركود مالي / SKU" v={it.sku} onChange={v => setIt(p => ({ ...p, sku: v }))}/>
              <FSel label="تصنيف الصنف" v={it.cat} onChange={v => setIt(p => ({ ...p, cat: v }))} opts={["بضائع جاهزة", "مواد خام", "مستلزمات عامة", "منتجات مصنعة"]}/>
              <FInp label="وحدة العد والقياس" v={it.unit} onChange={v => setIt(p => ({ ...p, unit: v }))}/>
              <FNum label="الكمية المتوفرة حالياً" v={it.qty} onChange={v => setIt(p => ({ ...p, qty: v }))}/>
              <FNum label="حد الأمان الأدنى للمادة" v={it.minQty} onChange={v => setIt(p => ({ ...p, minQty: v }))}/>
              <FNum label="تكلفة الشراء الأساسية" v={it.cost} onChange={v => setIt(p => ({ ...p, cost: v }))}/>
              <FNum label="سعر البيع المقترح للمستهلك" v={it.sell} onChange={v => setIt(p => ({ ...p, sell: v }))}/>
            </div>
            <div style={{ display: "flex", gap: "10px", marginTop: "14px" }}>
              <Btn onClick={() => handleSaveModal("items", items, it)}>حفظ المادة</Btn>
              <Btn v="secondary" onClick={() => setModal(null)}>إلغاء الأمر</Btn>
            </div>
          </Modal>
        );
      }

      case "invoice": {
        return (
          <Modal title={modal.d ? "تحديث وتعديل الفاتورة" : "توليد وإصدار فاتورة جديدة"} onClose={() => setModal(null)} w={560}>
            <InvForm data={modal.d} onSave={f => {
              const updated = modal.d ? invs.map(x => x.id === modal.d.id ? f : x) : [{ ...f, id: `INV-${Date.now().toString(36).toUpperCase()}` }, ...invs];
              persist("invs", updated);
              showFlash("✓ تم حفظ الفاتورة بنجاح في سجلات النظام المالي");
              setModal(null);
            }}/>
          </Modal>
        );
      }

      case "quote": {
        return (
          <Modal title={modal.d ? "تعديل محتوى عرض السعر" : "إصدار عرض أسعار جديد لعميل"} onClose={() => setModal(null)} w={540}>
            <InvForm data={modal.d} isQuote onSave={f => {
              const updated = modal.d ? quotes.map(x => x.id === modal.d.id ? f : x) : [{ ...f, id: `QUO-${Date.now().toString(36).toUpperCase()}` }, ...quotes];
              persist("quotes", updated);
              showFlash("✓ تم توثيق وحفظ عروض الأسعار المقترحة");
              setModal(null);
            }}/>
          </Modal>
        );
      }

      case "bank": {
        const d = modal.d;
        const [bf, setBf] = useState(d || { name: "", bank: "", no: "", type: "جاري", bal: 0, cur: "ليرة" });
        return (
          <Modal title={d ? "تحديث بيانات الحساب" : "إضافة صندوق أو حساب نقد جديد"} onClose={() => setModal(null)}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              <FInp label="اسم الحساب المالي" v={bf.name} onChange={v => setBf(p => ({ ...p, name: v }))} req/>
              <FInp label="الجهة المصرفية / البنك" v={bf.bank} onChange={v => setBf(p => ({ ...p, bank: v }))}/>
              <FInp label="رقم الآيبان / الحساب" v={bf.no} onChange={v => setBf(p => ({ ...p, no: v }))}/>
              <FSel label="نوع الحساب المالي" v={bf.type} onChange={v => setBf(p => ({ ...p, type: v }))} opts={["جاري", "توفير واستثمار", "رقمي", "نقدي"]}/>
              <FNum label="الرصيد النقدي المتوفر حالياً" v={bf.bal} onChange={v => setBf(p => ({ ...p, bal: v }))}/>
              <FSel label="العملة الرسمية للحساب" v={bf.cur} onChange={v => setBf(p => ({ ...p, cur: v }))} opts={["ليرة", "دولار", "يورو"]}/>
            </div>
            <div style={{ display: "flex", gap: "10px", marginTop: "14px" }}>
              <Btn onClick={() => handleSaveModal("banks", banks, bf)}>حفظ الحساب</Btn>
              <Btn v="secondary" onClick={() => setModal(null)}>إلغاء</Btn>
            </div>
          </Modal>
        );
      }

      case "journal": {
        const d = modal.d;
        const [jf, setJf] = useState(d || { date: today(), description: "", entries: [{ account: "", debit: 0, credit: 0 }, { account: "", debit: 0, credit: 0 }] });
        const totDebit = jf.entries.reduce((s, e) => s + (e.debit || 0), 0);
        const totCredit = jf.entries.reduce((s, e) => s + (e.credit || 0), 0);
        const balanced = totDebit === totCredit && totDebit > 0;
        
        return (
          <Modal title={d ? "تحديث القيد اليومي" : "تسجيل قيد محاسبي مزدوج جديد"} onClose={() => setModal(null)} w={520}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              <FInp label="تاريخ تسجيل القيد" v={jf.date} onChange={v => setJf(p => ({ ...p, date: v }))} type="date"/>
              <FInp label="شرح تفصيلي وبيان مالي" v={jf.description} onChange={v => setJf(p => ({ ...p, description: v }))} req/>
            </div>
            <div style={{ margin: "10px 0 6px", display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: "8px", fontSize: "11px", color: T.muted }}>
              <span>الحساب المالي</span>
              <span style={{ textAlign: "center" }}>مدين</span>
              <span style={{ textAlign: "center" }}>دائن</span>
            </div>
            {jf.entries.map((entry, idx) => (
              <div key={idx} style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: "8px", marginBottom: "8px" }}>
                <input 
                  value={entry.account} 
                  onChange={e => setJf(p => ({ ...p, entries: p.entries.map((x, xidx) => xidx === idx ? { ...x, account: e.target.value } : x) }))}
                  placeholder="الحساب الفرعي" 
                  style={{ background: T.surface, border: `1px solid ${T.border2}`, borderRadius: "8px", padding: "10px", color: T.text, fontSize: "12px" }}
                />
                <input 
                  type="number" 
                  value={entry.debit || ""} 
                  onChange={e => setJf(p => ({ ...p, entries: p.entries.map((x, xidx) => xidx === idx ? { ...x, debit: Number(e.target.value) } : x) }))}
                  placeholder="0" 
                  style={{ background: T.surface, border: `1px solid ${T.border2}`, borderRadius: "8px", padding: "10px", color: T.cyan, fontSize: "12px", textAlign: "center" }}
                />
                <input 
                  type="number" 
                  value={entry.credit || ""} 
                  onChange={e => setJf(p => ({ ...p, entries: p.entries.map((x, xidx) => xidx === idx ? { ...x, credit: Number(e.target.value) } : x) }))}
                  placeholder="0" 
                  style={{ background: T.surface, border: `1px solid ${T.border2}`, borderRadius: "8px", padding: "10px", color: T.gold, fontSize: "12px", textAlign: "center" }}
                />
              </div>
            ))}
            <Btn v="secondary" onClick={() => setJf(p => ({ ...p, entries: [...p.entries, { account: "", debit: 0, credit: 0 }] }))}>+ إضافة حساب آخر</Btn>
            
            <div style={{ 
              background: balanced ? T.green + "11" : T.red + "11", 
              border: `1px solid ${balanced ? T.green : T.red}33`, 
              borderRadius: "10px", 
              padding: "12px", 
              margin: "12px 0", 
              display: "flex", 
              justifyContent: "space-between", 
              fontSize: "12px" 
            }}>
              <span style={{ color: balanced ? T.green : T.red, fontWeight: "bold" }}>{balanced ? "✓ القيد متوازن ومستقر" : "⚠️ القيد غير متوازن"}</span>

            </div>

            <div style={{ display: "flex", gap: "10px" }}>
              <Btn onClick={async () => {

                const updated = d ? journal.map(x => x.id === d.id ? jf : x) : [{ ...jf, id: uid() }, ...journal];

                showFlash("✓ تم قيد المعاملة بنجاح بالدفتر المزدوج الموحد");
                setModal(null);
              }} disabled={!balanced}>حفظ القيد اليومي</Btn>
              <Btn v="secondary" onClick={() => setModal(null)}>إلغاء الأمر</Btn>
            </div>
          </Modal>
        );
      }

      case "settings": {
        const [sf, setSf] = useState({ name: user.name, biz: user.biz, currency: user.currency || "ليرة", taxRate: user.taxRate || 0 });

          <Modal title="إعدادات وحوكمة الحساب المالي" onClose={() => setModal(null)}>
            <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
              <FInp label="اسمك الكامل (صاحب الحساب)" v={sf.name} onChange={v => setSf(p => ({ ...p, name: v }))}/>
              <FInp label="الاسم التجاري للمؤسسة / المنشأة" v={sf.biz} onChange={v => setSf(p => ({ ...p, biz: v }))}/>
              <FSel label="العملة الرسمية للتقارير" v={sf.currency} onChange={v => setSf(p => ({ ...p, currency: v }))} opts={["ليرة", "دولار", "يورو"]}/>
              <FNum label="نسبة ضريبة القيمة المضافة الافتراضية (%)" v={sf.taxRate} onChange={v => setSf(p => ({ ...p, taxRate: v }))}/>
              <div style={{ display: "flex", gap: "10px", marginTop: "14px" }}>
                <Btn onClick={async () => {
                  const updatedUser = { ...user, ...sf };
                  await onUpdateUser(updatedUser);
                  showFlash("✓ تم تحديث إعدادات النظام وتطبيقها ماليًا");
                  setModal(null);
                }}>حفظ الإعدادات</Btn>
                <Btn v="secondary" onClick={() => setModal(null)}>إلغاء الأمر</Btn>
              </div>
            </div>
          </Modal>
        );
      }
      
      default:
        return null;
    }
  };

  // ──────────────────────────────────────────────────────

                            <stop offset="5%" stopColor={T.green} stopOpacity={0.25}/>

                  <button 
                    key={m}

                      color: inputMode === m ? T.cyan : T.muted,

                      width: "100%", 
                      minHeight: "140px", 
                      background: "transparent", 
                      border: "none", 
                      color: T.text, 
                      fontSize: "14px", 
                      resize: "none", 
                      lineHeight: 1.8, 
                      direction: "rtl", 
                      outline: "none"

                <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: "18px", padding: "40px 20px", textAlign: "center" }}>

                    padding: "6px 16px",

                    <div>{typeChip(txn.type)}</div>
                    <span style={{ color: T.cyan }}>{txn.entry?.debit || "الصندوق"}</span>
                    <span style={{ color: T.gold }}>{txn.entry?.credit || "المبيعات"}</span>

                      onClick={() => handleDelete("txns", txns, txn.id)} 
                      style={{ background: "none", border: "none", color: T.muted, fontSize: "18px", cursor: "pointer" }}
                      onMouseEnter={e => e.currentTarget.style.color = T.red}
                      onMouseLeave={e => e.currentTarget.style.color = T.muted}
                    >
                      &times;
                    </button>
                  </div>
                ))}
              </div>
            </div>
          </PageWrapper>
        );

      case "custs":
        return (
          <PageWrapper title="سجل العملاء وإدارة الذمم" sub="إدارة شاملة لبطاقات العملاء وعلاقاتهم التجارية مع المنشأة" actions={<Btn onClick={() => setModal({ t: "cust" })} icon="👤">إضافة عميل جديد</Btn>}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: "16px" }}>
              {custs.map(cust => (
                <div key={cust.id} style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: "18px", padding: "20px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "14px" }}>
                    <div style={{ width: "38px", height: "38px", borderRadius: "10px", background: T.cyan + "15", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "18px" }}>👤</div>
                    <div style={{ display: "flex", gap: "6px" }}>
                      <Btn sm v="secondary" onClick={() => setModal({ t: "cust", d: cust })}>تعديل</Btn>
                      <Btn sm v="danger" onClick={() => handleDelete("custs", custs, cust.id)}>&times;</Btn>
                    </div>
                  </div>
                  <h3 style={{ fontSize: "15px", color: T.white, fontWeight: "bold" }}>{cust.name}</h3>
                  <p style={{ fontSize: "12px", color: T.muted, marginTop: "4px" }}>📞 {cust.phone || "—"}</p>
                  <p style={{ fontSize: "12px", color: T.muted }}>✉ {cust.email || "—"}</p>

                        <span style={{ color: T.gold }}>مستحق للتحصيل (ذمة):</span>

                      </div>

                      <span style={{ color: T.green, fontSize: "12px", fontWeight: "bold" }}>✓ رصيد مالي متوازن ومسدد بالكامل</span>
                    )}

                </div>
              ))}
            </div>
          </PageWrapper>
        );

      case "supps":
        return (
          <PageWrapper title="إدارة حسابات الموردين" sub="قيد ومراجعة حسابات التوريد والذمم المستحقة للموردين" actions={<Btn onClick={() => setModal({ t: "supp" })} icon="🏭">إضافة مورد جديد</Btn>}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: "16px" }}>

      case "tax":
        return (
          <PageWrapper title="التقرير الضريبي الاسترشادي" sub="تقدير الحسابات الضريبية المفروضة بناءً على المبيعات وضريبة القيمة المضافة المعرفة">
            <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: "18px", padding: "24px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px", marginBottom: "20px" }}>
                <div style={{ background: T.surface, padding: "16px", borderRadius: "12px" }}>
                  <div style={{ fontSize: "11px", color: T.muted }}>المبيعات الخاضعة للضريبة</div>
                  <div style={{ fontSize: "20px", fontWeight: "bold", color: T.green, marginTop: "6px" }}>{fmt(sales)} ل.س</div>
                </div>
                <div style={{ background: T.surface, padding: "16px", borderRadius: "12px" }}>
                  <div style={{ fontSize: "11px", color: T.muted }}>الضريبة التقديرية المستحقة ({user.taxRate}%)</div>
                  <div style={{ fontSize: "20px", fontWeight: "bold", color: T.red, marginTop: "6px" }}>{fmt(taxDue)} ل.س</div>
                </div>
              </div>
              <p style={{ color: T.muted, fontSize: "12px", lineHeight: 1.6 }}>* الملاحظة: الحسابات الواردة في هذا التقرير هي حسابات استرشادية مبسطة مبنية على إعدادات الحساب المدخلة من قبل صاحب المنشأة.</p>
            </div>
          </PageWrapper>
        );

      case "journal":
        return (
          <PageWrapper title="القيود المحاسبية اليومية المزدوجة" sub="سجل تفصيلي ودقيق لكافة قيود اليومية المزدوجة المتوازنة في المنشأة" actions={<Btn onClick={() => setModal({ t: "journal" })} icon="📔">قيد يومي جديد</Btn>}>
            <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
              {journal.map((j) => (
                <div key={j.id} style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: "18px", padding: "18px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px", borderBottom: `1px solid ${T.border}`, paddingBottom: "10px" }}>
                    <div>
                      <span style={{ fontWeight: "bold", color: T.white, fontSize: "14px" }}>{j.description}</span>
                      <span style={{ fontSize: "11px", color: T.muted, marginRight: "10px" }}>تاريخ القيد: {j.date}</span>
                    </div>
                    <Btn sm v="danger" onClick={() => handleDelete("journal", journal, j.id)}>حذف القيد</Btn>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: "8px", fontSize: "12px", color: T.muted }}>
                    <span>الحساب المالي</span>
                    <span style={{ textAlign: "center" }}>مدين</span>
                    <span style={{ textAlign: "center" }}>دائن</span>
                  </div>
                  {j.entries?.map((e, idx) => (
                    <div key={idx} style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: "8px", fontSize: "13px", marginTop: "8px" }}>
                      <span style={{ color: T.text }}>{e.account}</span>
                      <span style={{ textAlign: "center", color: T.cyan }}>{e.debit ? `${fmt(e.debit)} ل.س` : "—"}</span>
                      <span style={{ textAlign: "center", color: T.gold }}>{e.credit ? `${fmt(e.credit)} ل.س` : "—"}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </PageWrapper>
        );

      case "advisor":
        return (
          <PageWrapper title="المستشار المالي الذكي (ميسور AI)" sub="اسأل ميسور حول أداء مشروعك المالي وتلقى نصائح استراتيجية مستمدة من سجلات دفاتر المحاسبة">
            <div style={{ maxWidth: "600px", margin: "0 auto", display: "flex", flexDirection: "column", gap: "16px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                {[
                  "ليش الأرباح منخفضة؟",
                  "كيف بقدر خفض المصاريف؟",
                  "كيف بحسن التدفق النقدي؟",
                  "ما هي أكبر المخاطر الحالية؟"
                ].map(question => (
                  <button 
                    key={question} 
                    onClick={() => setAdvQ(question)}
                    style={{ 
                      background: T.card, 
                      border: `1px solid ${T.border}`, 
                      borderRadius: "12px", 
                      padding: "14px", 
                      cursor: "pointer", 
                      color: T.text, 
                      fontSize: "12px", 
                      textAlign: "right", 
                      fontWeight: "bold",
                      transition: "all 0.2s" 
                    }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = T.cyan; e.currentTarget.style.background = T.cardHov; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = T.border; e.currentTarget.style.background = T.card; }}
                  >
                    💡 {question}
                  </button>
                ))}
              </div>

              <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: "18px", padding: "20px" }}>
                <textarea 
                  value={advQ} 
                  onChange={e => setAdvQ(e.target.value)} 
                  placeholder="اسأل المستشار أي سؤال مالي حول منشأتك وعملياتها الحالية..."
                  style={{ 
                    width: "100%", 
                    minHeight: "100px", 
                    background: "transparent", 
                    border: "none", 
                    color: T.text, 
                    fontSize: "13px", 
                    resize: "none", 
                    lineHeight: 1.8, 
                    direction: "rtl", 
                    outline: "none" 
                  }}
                />
                <div style={{ display: "flex", justifyContent: "flex-end", borderTop: `1px solid ${T.border}`, paddingTop: "14px", marginTop: "14px" }}>
                  <Btn onClick={handleAdvisorQuery} disabled={!advQ.trim() || advLoad} icon={advLoad ? undefined : "🤖"}>
                    {advLoad ? <Spin /> : "الحصول على التوصية الذكية"}
                  </Btn>
                </div>
              </div>

              {advA && (
                <div style={{ background: `${T.cyan}08`, border: `1px solid ${T.cyan}33`, borderRadius: "18px", padding: "20px", animation: "fadeUp .3s ease-out" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "12px" }}>
                    <div style={{ width: "28px", height: "28px", borderRadius: "8px", background: T.gCyan, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "14px" }}>🤖</div>
                    <span style={{ fontSize: "13px", fontWeight: "bold", color: T.cyan }}>المستشار المالي ميسور AI</span>
                  </div>
                  <div style={{ fontSize: "13px", color: T.text, lineHeight: 1.9, whiteSpace: "pre-wrap" }}>{advA}</div>
                </div>
              )}
            </div>
          </PageWrapper>
        );

      case "finance":
        return (
          <PageWrapper title="الملف المالي المتكامل للمنشأة" sub="ملف مالي موحد وجاهز للاستيراد والتصدير والعرض على جهات الدعم أو التمويل">
            <div className="split-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px" }}>
              <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: "18px", padding: "24px" }}>
                <h3 style={{ fontSize: "15px", color: T.white, fontWeight: "bold", marginBottom: "14px" }}>الملخص المالي العام</h3>
                {[
                  ["الاسم التجاري للمشروع", user.biz],
                  ["المستثمر المالي المسؤول", user.name],
                  ["إجمالي حركة الإيرادات", fmtC(sales)],
                  ["إجمالي حركة المصاريف", fmtC(expenses)],
                  ["صافي الأرباح المسجلة", fmtC(profit)],
                  ["إجمالي الذمم المعلقة للقبض", fmtC(pendingTotal)]
                ].map(([label, val], idx) => (
                  <div key={idx} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${T.border}`, fontSize: "12px" }}>
                    <span style={{ color: T.muted }}>{label}</span>
                    <span style={{ color: T.text, fontWeight: "bold" }}>{val}</span>
                  </div>
                ))}
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
                <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: "18px", padding: "20px" }}>
                  <h4 style={{ fontSize: "13px", color: T.white, fontWeight: "bold", marginBottom: "8px" }}>تصدير وأرشفة البيانات محلياً</h4>
                  <p style={{ fontSize: "11px", color: T.muted, marginBottom: "14px" }}>احصل على نسخة احتياطية كاملة من جميع سجلات المنشأة على جهازك.</p>
                  <Btn full onClick={() => showFlash("✓ تم توليد وتنزيل النسخة الاحتياطية بنجاح على جهازك")}>حفظ البيانات واستخراجها الآن</Btn>
                </div>

                <div style={{ background: `${T.cyan}08`, border: `1px solid ${T.cyan}22`, borderRadius: "18px", padding: "20px", textAlign: "center" }}>
                  <h4 style={{ fontSize: "13px", color: T.white, fontWeight: "bold", marginBottom: "6px" }}>تقديم طلب تمويل استثماري</h4>
                  <p style={{ fontSize: "11px", color: T.muted, marginBottom: "14px" }}>توليد وإرسال ملف المنشأة المالي المتكامل للجهات المصرفية الداعمة بضغطة واحدة.</p>
                  <Btn v="success" onClick={() => showFlash("✓ تم توثيق وإرسال الملف المالي والميزانية لجهات التمويل")}>إرسال الملف التمويلي الموحد ←</Btn>
                </div>
              </div>
            </div>
          </PageWrapper>
        );

      default:
        return null;
    }
  };

  // توليد المودال الفعال حالياً
  const ActiveModalComponent = renderActiveModal();

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: T.bg, direction: "rtl", color: T.text }}>
      {/* عرض الفلاش نوتيفيكيشن المتنقل */}
      {flash && (
        <div style={{ 
          position: "fixed", 
          top: "20px", 
          left: "50%", 
          transform: "translateX(-50%)", 
          background: flash.color + "15", 
          border: `1px solid ${flash.color}44`, 
          color: flash.color, 
          padding: "10px 24px", 
          borderRadius: "30px", 
          fontSize: "13px", 
          fontWeight: "bold", 
          zIndex: 3500, 
          animation: "fadeUp .3s ease-out", 
          backdropFilter: "blur(12px)", 
          boxShadow: `0 8px 24px ${flash.color}22` 
        }}>
          {flash.msg}
        </div>
      )}

      {/* المودال النشط */}
      {ActiveModalComponent}

      {/* حماية استجابة المحمول وتوافقية المتصفحات */}
      {sideOpen && (
        <div 
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", zIndex: 998, backdropFilter: "blur(4px)" }} 
          onClick={() => setSideOpen(false)}
        />
      )}

      {sideOpen && (
        <div style={{ 
          position: "fixed", top: 0, right: 0, bottom: 0, width: "240px", background: T.surface, zIndex: 999, padding: "16px", borderLeft: `1px solid ${T.border}` 
        }}>
          <SidebarContent mobile/>
        </div>
      )}

      {/* القائمة الجانبية للشاشات الكبيرة */}
      <aside className="desk-side" style={{ 
        width: "240px", background: T.surface, borderLeft: `1px solid ${T.border}`, padding: "16px", display: "flex", flexDirection: "column", height: "100vh", position: "sticky", top: 0, flexShrink: 0 
      }}>
        <SidebarContent />
      </aside>

      {/* الرأس المحمول للهواتف الذكية */}
      <div className="mob-bar" style={{ 
        position: "fixed", top: 0, right: 0, left: 0, height: "56px", background: T.surface, borderBottom: `1px solid ${T.border}`, zIndex: 100, alignItems: "center", justifyContent: "space-between", padding: "0 16px", display: "none" 
      }}>
        <button onClick={() => setSideOpen(true)} style={{ background: "none", border: "none", color: T.white, fontSize: "24px", cursor: "pointer" }}>☰</button>
        <span style={{ fontSize: "16px", fontWeight: "900", color: T.white }}>ميسور</span>
        <Btn onClick={() => nav("input")} sm icon="➕">إدخال</Btn>
      </div>

      {/* المحتوى والمحاور الرئيسية لكل شاشة */}
      <main className="main-wrap" style={{ flex: 1, padding: "24px 32px", overflowY: "auto" }}>
        <div className="mob-bar" style={{ height: "56px", display: "none" }}/>
        {renderActivePage()}
      </main>

      {/* الملاحة والتحكم السفلي للهواتف المحمولة */}
      <div className="mob-bottom-nav" style={{ 
        position: "fixed", bottom: 0, right: 0, left: 0, height: "60px", background: T.surface, borderTop: `1px solid ${T.border}`, display: "flex", justifyContent: "space-around", alignItems: "center", zIndex: 100 
      }}>
        {[
          ["dashboard", "🏠", "الرئيسية"],
          ["input", "➕", "إدخال سريع"],
          ["txns", "📋", "الحركة"],
          ["stock", "📦", "المخزن"],
          ["advisor", "🤖", "المستشار"]
        ].map(([p, ic, l]) => (
          <button 
            key={p} 
            onClick={() => nav(p)} 
            style={{ 
              background: "none", border: "none", color: pg === p ? T.cyan : T.muted, display: "flex", flexDirection: "column", alignItems: "center", gap: "2px", fontSize: "10px", cursor: "pointer", fontWeight: pg === p ? "bold" : "normal" 
            }}
          >
            <span style={{ fontSize: "18px" }}>{ic}</span>
            <span>{l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────
//  11. نقطة الانطلاق الأساسية للتطبيق (Root Component)
// ──────────────────────────────────────────────────────
function MaysourRoot() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const sessionUser = window.DB.getSession();
    if (sessionUser) setUser(sessionUser);
    setChecking(false);
  }, []);

  if (checking) return (
    <div style={{ minHeight: "100vh", background: T.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "16px" }}>
      <Spin s={40}/>
      <p style={{ color: T.cyan, fontSize: "14px", fontWeight: "bold" }}>جاري تحميل منظومة ميسور ماليًا...</p>
    </div>
  );

  const handleLogin = (u) => {
    setUser(u);
    if (!u.isDemo) window.DB.set("curUser", u);
  };

  const handleLogout = () => {
    window.DB.del("session");
    window.DB.del("curUser");
    setUser(null);
  };

  const handleUpdateUser = (updatedUser) => {
    setUser(updatedUser);
    if (!updatedUser.isDemo) {
      window.DB.set("curUser", updatedUser);
      window.DB.updateUser(updatedUser.email, updatedUser);
    }
  };

  return user ? (
    <MaysourApp user={user} onLogout={handleLogout} onUpdateUser={handleUpdateUser} />
  ) : (
    <AuthScreen onLogin={handleLogin} />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MaysourRoot/>);
</script>
</body>
</html>
